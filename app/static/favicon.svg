<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Badge background -->
  <rect width="100" height="100" rx="14" fill="#0c1628"/>
  <!-- Subtle inset frame -->
  <rect x="3" y="3" width="94" height="94" rx="11" fill="none" stroke="#3ecfa8" stroke-width="1" opacity="0.4"/>

  <!-- Handle arch -->
  <path d="M34,37 L34,26 Q34,13 50,13 Q66,13 66,26 L66,37"
    fill="none" stroke="#3ecfa8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Handle attachment plates -->
  <rect x="29" y="33" width="10" height="7" rx="2" fill="#0c1628" stroke="#3ecfa8" stroke-width="2"/>
  <rect x="61" y="33" width="10" height="7" rx="2" fill="#0c1628" stroke="#3ecfa8" stroke-width="2"/>

  <!-- Body -->
  <rect x="11" y="37" width="78" height="51" rx="5" fill="none" stroke="#3ecfa8" stroke-width="3.5"/>

  <!-- Lid divider -->
  <line x1="11" y1="57" x2="89" y2="57" stroke="#3ecfa8" stroke-width="2"/>

  <!-- Stitching detail on lid -->
  <line x1="17" y1="44" x2="83" y2="44" stroke="#3ecfa8" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.45"/>

  <!-- Central clasp -->
  <rect x="41" y="52" width="18" height="10" rx="2" fill="#0c1628" stroke="#3ecfa8" stroke-width="2"/>
  <circle cx="50" cy="57" r="2.5" fill="#3ecfa8"/>

  <!-- Corner rivets -->
  <circle cx="18" cy="44" r="2" fill="#3ecfa8" opacity="0.75"/>
  <circle cx="82" cy="44" r="2" fill="#3ecfa8" opacity="0.75"/>
  <circle cx="18" cy="81" r="2" fill="#3ecfa8" opacity="0.75"/>
  <circle cx="82" cy="81" r="2" fill="#3ecfa8" opacity="0.75"/>
</svg>
